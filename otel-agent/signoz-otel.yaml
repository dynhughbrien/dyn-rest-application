receivers:

  hostmetrics:
    collection_interval: 30s
    scrapers:
      load: { }
      memory: { }
      filesystem: { }
      network: { }
      paging: { }
      # cpu/disk omitted on macOS

  prometheus:
    config:
      scrape_configs:
        - job_name: "node_exporter"
          static_configs:
            - targets: [ "localhost:9100" ]   # where node_exporter runs
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 10s
    send_batch_size: 1000

exporters:
  otlp:
    endpoint: "http://10.0.0.23:4317"
    tls:
      insecure: true
  debug:
    verbosity: normal

extensions:
  health_check:
  pprof:
  zpages:

service:
  extensions: [health_check, pprof, zpages]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp]
    metrics:
      receivers: [otlp, prometheus, hostmetrics]
      processors: [batch]
      exporters: [otlp]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp]
