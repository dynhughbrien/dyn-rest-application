## Otel Configuration for AppDynamics Java Agent
## Traces only for now

extensions:
  health_check:
    check_collector_pipeline:
      enabled: true
      interval: "15s"
      exporter_failure_threshold: 5
  pprof:
    endpoint: localhost:1777
  zpages:
    endpoint: localhost:55679

receivers:
  hostmetrics:
    collection_interval: 30s
    scrapers:
      load: { }
      memory: { }
      filesystem: { }
      network: { }
      paging: { }
      # cpu/disk omitted on macOS
  prometheus:
    config:
      scrape_configs:
        - job_name: "node_exporter"
          static_configs:
            - targets: [ "localhost:9100" ]   # where node_exporter runs
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:14317
      http:
        endpoint: 0.0.0.0:14318

processors:
  resource:
    attributes:
      - key: steelstratus.owner
        action: upsert
        value: "hugh.brien"
      - key: hostname
        action: upsert
        value: "steelstratus.com"
      - key: steelstratus.port
        action: upsert
        value: 443
  batch:
    timeout: 5s
    send_batch_size: 5

exporters:
  debug :
    verbosity : detailed
  file/combined :
    path : ./otel-agent/logs/combined-all.log
  otlphttp:
    endpoint: https://localhost:4318
    tls: { insecure: true }
    headers:
      signoz-ingestion-key: ''

service:
  extensions : [ health_check, pprof, zpages ]
  pipelines:
    metrics:
      receivers: [ prometheus ]
      exporters: [ otlphttp, file/combined]
    traces:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlphttp, file/combined]
    logs:
      receivers: [ otlp ]
      processors: [ resource, batch ]
      exporters: [ otlphttp ]

