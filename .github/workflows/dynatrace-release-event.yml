name: Dynatrace Release Event

# Triggers when a GitHub Release is published (created).
# Sends an SDLC release.created event to Dynatrace via the
# Business Events API (OpenPipeline ingestion endpoint).
#
# Required repository secrets:
#   DT_TENANT_URL  - e.g. uim8926h.sprint.dynatracelabs.com
#   DT_API_TOKEN   - Dynatrace API token with scope: bizevents.ingest

on:
  release:
    types: [created]

jobs:
  notify-dynatrace:
    runs-on: ubuntu-latest
    steps:
      - name: Send release.created event to Dynatrace OpenPipeline
        env:
          DT_API_TOKEN: ${{ secrets.DT_API_TOKEN }}
          DT_TENANT_URL: 'https://uim8926h.sprint.dynatracelabs.com'
        run: |
          # Dynatrace bizevents payload (flat JSON — compatible with all DT versions)
          PAYLOAD=$(printf '{
            "event.type": "com.github.release.created",
            "event.id": "%s-%s",
            "event.provider": "github.com/%s",
            "event.subject": "%s",
            "timestamp": "%s",
            "dt.sdlc.event_type": "release.created",
            "release.name": "%s",
            "release.version": "%s",
            "release.url": "%s",
            "release.author": "%s",
            "release.prerelease": %s,
            "release.draft": %s,
            "git.repository": "%s",
            "git.ref": "%s"
          }' \
            "${{ github.run_id }}" "${{ github.run_attempt }}" \
            "${{ github.repository }}" \
            "${{ github.event.release.tag_name }}" \
            "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            "${{ github.event.release.name }}" \
            "${{ github.event.release.tag_name }}" \
            "${{ github.event.release.html_url }}" \
            "${{ github.event.release.author.login }}" \
            "${{ github.event.release.prerelease }}" \
            "${{ github.event.release.draft }}" \
            "${{ github.repository }}" \
            "${{ github.ref }}")

          HTTP_STATUS=$(curl -s -o /tmp/dt_response.json -w "%{http_code}" \
            -X POST "https://uim8926h.sprint.dynatracelabs.com/api/v2/bizevents/ingest" \
            -H "Authorization: Api-Token ${DT_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}")

          echo "Dynatrace response status: ${HTTP_STATUS}"
          cat /tmp/dt_response.json

          if [ "${HTTP_STATUS}" -lt 200 ] || [ "${HTTP_STATUS}" -ge 300 ]; then
            echo "ERROR: Failed to send release event to Dynatrace (HTTP ${HTTP_STATUS})"
            exit 1
          fi

          echo "SUCCESS: release.created event delivered to Dynatrace for ${{ github.event.release.tag_name }}"
